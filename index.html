<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:Racetrack.ply"
      position="0 -2.5 -2"
      rotation="-90 0 90"
      scale="1.75 1.75 1.75"
      ></a-entity>

<a-entity
      ply-model="scr:racecar.ply"
      position="0 0 0"
      scale="1.75 1.75 1.75"
      ></a-entity>

      <a-entity
      ply-model="src:people.ply"
      position="-2 -2.15 -10"
      scale="1.75 1.75 1.75"
      rotation="-90 0 0"

      animation="
      property: position;
      from: -2 -2.15 -22;
      to: -5 -2.15 -22;
      dur: 5000;
      loop: true;
      "
      
      ></a-entity>
                 
 <a-entity
      ply-model="src:racecar.ply"
      position="-9 -2.15 -21.7"
      scale="1.75 1.75 1.75"
      rotation="-90 0 0"

      animation="
      property: position;
      from: -9 -2.15 -21.7;
      to: -14.3 -2.1 -21.7;
      dur: 7000;
      loop: true;"
      ></a-entity>

 <a-entity
      ply-model="src:light.ply"
      position="-8.05 -1.62 -14.58"
      scale="1.75 1.75 1.75"
      rotation="-90 0 0"

  animation="
  property: color;
  from: green;
  to: red;
  dur: 5000;
  loop: true;
  "
      ></a-entity>

 <a-entity
      ply-model="src:light.ply"
      position="-15.75 -1.62 -10.58"
      scale="1.75 1.75 1.75"
      rotation="-90 0 0"
      ></a-entity>
<a-entity
      ply-model="src:light.ply"
      position="-17.5 -1.45 -18.1"
      scale="1.75 1.75 1.75"
      rotation="-90 0 0"
      ></a-entity>






    </a-scene>


  </body>



</html>
